# Single-tenant pi-forge.
#   cp docker/.env.example docker/.env   # edit secrets first time
#   cd docker && docker compose up -d --build
#
# Bind mounts, env-var rationale, and operator trade-offs:
# see ../docs/containers.md.

services:
  pi-forge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Override in .env to match `id -u` / `id -g` for writable bind mounts.
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
        # Advanced: set when using docker-compose.sandbox.yml with
        # non-default pi-tools IDs (see ../docs/agent-tool-sandbox.md).
        PTOOLS_UID: ${AGENT_TOOL_UID:-1001}
        PTOOLS_GID: ${AGENT_TOOL_GID:-1001}
    image: pi-forge:latest
    container_name: ${CONTAINER_NAME:-pi-forge}
    restart: unless-stopped
    # Regular/default mode runs the server as pi directly. This avoids
    # requiring SETUID/SETGID capabilities just to have the entrypoint
    # switch away from root. Sandbox mode uses docker-compose.sandbox.yml.
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      # Loopback only by default — drop the `127.0.0.1:` prefix to expose
      # to the LAN (and set UI_PASSWORD or API_KEY first; see SECURITY.md).
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - ${WORKSPACE_HOST_PATH:-../workspace}:/workspace
      - ${PI_CONFIG_HOST_PATH:-~/.pi/agent}:/home/pi/.pi/agent
      # Default differs from the host pi-forge dir so the container has
      # its own project list — see containers.md.
      - ${FORGE_DATA_HOST_PATH:-~/.pi-forge-docker}:/home/pi/.pi-forge
    environment:
      # Container-internal paths — fixed.
      WORKSPACE_PATH: /workspace
      PI_CONFIG_DIR: /home/pi/.pi/agent
      FORGE_DATA_DIR: /home/pi/.pi-forge
      PORT: "3000"
      # Auth — read from .env. Both empty = auth disabled.
      UI_PASSWORD: ${UI_PASSWORD:-}
      API_KEY: ${API_KEY:-}
      # Logging + reverse-proxy hint.
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # Less-used server env vars (JWT_SECRET, CORS_ORIGIN, MINIMAL_UI,
      # LDAP, orchestration, rate limits, terminal tuning, sandbox, etc.)
      # are intentionally documentation-only; add them in your own compose
      # override when needed. See ../docs/configuration.md.
    # Hardening. Not read-only because the agent's bash tool needs to
    # write to /home/pi/.npm, /tmp, etc. Regular mode does not need any
    # Linux capabilities because the container starts as pi directly.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
