# Single-tenant pi-forge.
#   cp docker/.env.example docker/.env   # edit secrets first time
#   cd docker && docker compose up -d --build
#
# Bind mounts, env-var rationale, and operator trade-offs:
# see ../docs/containers.md.

services:
  pi-forge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Override in .env to match `id -u` / `id -g` for writable bind mounts.
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: pi-forge:latest
    container_name: ${CONTAINER_NAME:-pi-forge}
    restart: unless-stopped
    ports:
      # Loopback only by default — drop the `127.0.0.1:` prefix to expose
      # to the LAN (and set UI_PASSWORD or API_KEY first; see SECURITY.md).
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - ${WORKSPACE_HOST_PATH:-../workspace}:/workspace
      - ${PI_CONFIG_HOST_PATH:-~/.pi/agent}:/home/pi/.pi/agent
      # Default differs from the host pi-forge dir so the container has
      # its own project list — see containers.md.
      - ${FORGE_DATA_HOST_PATH:-~/.pi-forge-docker}:/home/pi/.pi-forge
    environment:
      # Container-internal paths — fixed.
      - WORKSPACE_PATH=/workspace
      - PI_CONFIG_DIR=/home/pi/.pi/agent
      - FORGE_DATA_DIR=/home/pi/.pi-forge
      - PORT=3000
      # Auth — read from .env. Both empty = auth disabled.
      - UI_PASSWORD=${UI_PASSWORD:-}
      - REQUIRE_PASSWORD_CHANGE=${REQUIRE_PASSWORD_CHANGE:-false}
      - JWT_SECRET=${JWT_SECRET:-}
      - API_KEY=${API_KEY:-}
      # Logging + reverse-proxy hint.
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - MINIMAL_UI=${MINIMAL_UI:-false}
    # Hardening (mirrors the k8s manifests). Not read-only because the
    # agent's bash tool needs to write to /home/pi/.npm, /tmp, etc.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
